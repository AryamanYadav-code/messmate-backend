<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ef"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123c69"/>
      <stop offset="100%" stop-color="#1f6f78"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9d976"/>
      <stop offset="100%" stop-color="#f39f5a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6cc070"/>
      <stop offset="100%" stop-color="#3e8e41"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5b041"/>
      <stop offset="100%" stop-color="#d68910"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#395b64" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 20px 'Segoe UI', Arial, sans-serif; fill: #d8ecff; }
      .section { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .cardtitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .sdg { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .body { font: 16px 'Segoe UI', Arial, sans-serif; fill: #355070; }
      .small { font: 15px 'Segoe UI', Arial, sans-serif; fill: #4f6d7a; }
      .tiny { font: 13px 'Segoe UI', Arial, sans-serif; fill: #648199; }
      .heroText { font: 16px 'Segoe UI', Arial, sans-serif; fill: #f6fbff; }
      .stat { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #123c69; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1450" cy="120" r="180" fill="#d9f3e6" opacity="0.45"/>
  <circle cx="160" cy="880" r="220" fill="#d6e9ff" opacity="0.5"/>

  <g filter="url(#shadow)">
    <rect x="60" y="40" width="1480" height="255" rx="34" fill="url(#hero)"/>
    <text x="95" y="98" class="title">College Mess App: Sustainable Development Goals Impact Chart</text>
    <text x="95" y="132" class="subtitle">Picture-oriented infographic showing how the app improves campus meal access, supports student well-being, and reduces food waste.</text>

    <g>
      <rect x="95" y="165" width="420" height="95" rx="20" fill="#ffffff" opacity="0.14"/>
      <text x="120" y="196" class="label" fill="#ffffff">Project Purpose</text>
      <text x="120" y="222" class="heroText">Digitize the college mess system through menu visibility, meal booking,</text>
      <text x="120" y="246" class="heroText">pickup scheduling, and demand tracking for students and staff.</text>
    </g>

    <g>
      <rect x="540" y="165" width="255" height="95" rx="20" fill="#ffffff" opacity="0.14"/>
      <text x="566" y="196" class="label" fill="#ffffff">Primary Users</text>
      <text x="566" y="222" class="heroText">Students</text>
      <text x="566" y="246" class="heroText">Mess staff and administrators</text>
    </g>

    <g>
      <rect x="820" y="165" width="285" height="95" rx="20" fill="#ffffff" opacity="0.14"/>
      <text x="845" y="196" class="label" fill="#ffffff">Core Outcome</text>
      <text x="845" y="222" class="heroText">Better food planning, quicker service,</text>
      <text x="845" y="246" class="heroText">and more sustainable campus operations</text>
    </g>

    <g>
      <rect x="1132" y="72" width="335" height="185" rx="28" fill="#ffffff" opacity="0.12"/>
      <rect x="1258" y="92" width="105" height="150" rx="18" fill="#ffffff"/>
      <rect x="1269" y="109" width="83" height="104" rx="12" fill="#e6f4ff"/>
      <rect x="1278" y="122" width="65" height="16" rx="8" fill="#ffd166"/>
      <rect x="1278" y="146" width="65" height="16" rx="8" fill="#7bd389"/>
      <rect x="1278" y="170" width="65" height="16" rx="8" fill="#f4978e"/>
      <circle cx="1310" cy="224" r="7" fill="#d0dbe6"/>
      <path d="M1180 150 h52 a18 18 0 0 1 18 18 v22 h-70 z" fill="#f4a261"/>
      <path d="M1172 190 h83 a18 18 0 0 1 18 18 v18 h-101 z" fill="#f6bd60"/>
      <circle cx="1195" cy="167" r="11" fill="#ffffff"/>
      <circle cx="1220" cy="167" r="11" fill="#ffffff"/>
      <path d="M1172 225 h99" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
      <text x="1148" y="110" class="label" fill="#ffffff">App + meal workflow</text>
      <text x="1148" y="136" class="heroText">Menu | Booking | Pickup | Planning</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="325" width="1480" height="145" rx="28" fill="#ffffff"/>
    <text x="90" y="365" class="section">How the App Creates Impact</text>

    <g>
      <circle cx="155" cy="415" r="26" fill="#123c69"/>
      <text x="147" y="423" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">1</text>
      <text x="198" y="404" class="label">Students view real-time menu availability</text>
      <text x="198" y="430" class="body">This reduces uncertainty and helps students decide early.</text>
    </g>

    <g>
      <circle cx="555" cy="415" r="26" fill="#1f6f78"/>
      <text x="547" y="423" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">2</text>
      <text x="598" y="404" class="label">Meals are pre-booked and pickup is scheduled</text>
      <text x="598" y="430" class="body">Queue pressure goes down and service becomes more organized.</text>
    </g>

    <g>
      <circle cx="985" cy="415" r="26" fill="#3e8e41"/>
      <text x="977" y="423" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">3</text>
      <text x="1028" y="404" class="label">Mess staff track demand before meal preparation</text>
      <text x="1028" y="430" class="body">The kitchen can prepare food closer to actual student demand.</text>
    </g>

    <g>
      <path d="M405 415 H510" stroke="#9bb4c7" stroke-width="5" stroke-linecap="round"/>
      <polygon points="510,415 494,406 494,424" fill="#9bb4c7"/>
      <path d="M835 415 H940" stroke="#9bb4c7" stroke-width="5" stroke-linecap="round"/>
      <polygon points="940,415 924,406 924,424" fill="#9bb4c7"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="500" width="455" height="410" rx="30" fill="#ffffff"/>
    <rect x="60" y="500" width="455" height="70" rx="30" fill="url(#gold)"/>
    <text x="88" y="545" class="sdg">SDG 2: Zero Hunger</text>

    <g transform="translate(350 602)">
      <circle cx="0" cy="0" r="54" fill="#fff7e3" stroke="#e1b54c" stroke-width="4"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="#e1b54c" stroke-width="4"/>
      <circle cx="-10" cy="-6" r="7" fill="#7bd389"/>
      <circle cx="12" cy="8" r="7" fill="#f4978e"/>
      <rect x="-3" y="-18" width="6" height="34" rx="3" fill="#f4a261"/>
      <rect x="18" y="-18" width="6" height="34" rx="3" fill="#f6bd60"/>
    </g>

    <text x="88" y="615" class="cardtitle">Why this SDG fits the project</text>
    <text x="88" y="645" class="body">A college mess app improves food access by making meals visible, bookable, and easier to collect on time.</text>

    <text x="88" y="700" class="label">App features connected to this SDG</text>
    <text x="88" y="728" class="small">- Daily menu display for students before meal hours</text>
    <text x="88" y="754" class="small">- Pre-booking system to secure meals in advance</text>
    <text x="88" y="780" class="small">- Clear pickup timing that reduces missed meals</text>

    <text x="88" y="830" class="label">What the chart is showing</text>
    <text x="88" y="858" class="small">The food plate icon represents reliable campus meal access.</text>
    <text x="88" y="884" class="small">The app helps students find and receive meals more consistently.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="572" y="500" width="455" height="410" rx="30" fill="#ffffff"/>
    <rect x="572" y="500" width="455" height="70" rx="30" fill="url(#green)"/>
    <text x="600" y="545" class="sdg">SDG 3: Good Health and Well-Being</text>

    <g transform="translate(860 604)">
      <path d="M0 48 C-14 18 -44 8 -66 31 C-87 8 -117 18 -131 48 C-144 72 -132 101 -66 146 C0 101 12 72 0 48 Z" fill="#ffe0e6" stroke="#4c9f38" stroke-width="4"/>
      <rect x="-82" y="52" width="32" height="10" rx="5" fill="#4c9f38"/>
      <rect x="-71" y="41" width="10" height="32" rx="5" fill="#4c9f38"/>
    </g>

    <text x="600" y="615" class="cardtitle">Why this SDG fits the project</text>
    <text x="600" y="645" class="body">Organized meal pickup and better meal information support healthier routines and reduce daily stress for students.</text>

    <text x="600" y="700" class="label">App features connected to this SDG</text>
    <text x="600" y="728" class="small">- Reduced waiting time through scheduled pickup</text>
    <text x="600" y="754" class="small">- Better visibility of meals so students do not skip food</text>
    <text x="600" y="780" class="small">- Smoother staff coordination that improves service experience</text>

    <text x="600" y="830" class="label">What the chart is showing</text>
    <text x="600" y="858" class="small">The heart icon represents student well-being and lower stress.</text>
    <text x="600" y="884" class="small">The app supports regular eating and a calmer campus food system.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1084" y="500" width="455" height="410" rx="30" fill="#ffffff"/>
    <rect x="1084" y="500" width="455" height="70" rx="30" fill="url(#orange)"/>
    <text x="1112" y="545" class="sdg">SDG 12: Responsible Consumption and Production</text>

    <g transform="translate(1372 605)">
      <circle cx="0" cy="0" r="54" fill="#fff6e5" stroke="#d68910" stroke-width="4"/>
      <path d="M-6 -32 C19 -33 37 -16 40 8" fill="none" stroke="#2a9d8f" stroke-width="6" stroke-linecap="round"/>
      <polygon points="45,2 44,21 28,10" fill="#2a9d8f"/>
      <path d="M25 26 C10 46 -18 53 -40 39" fill="none" stroke="#2a9d8f" stroke-width="6" stroke-linecap="round"/>
      <polygon points="-35,50 -49,36 -28,33" fill="#2a9d8f"/>
      <path d="M-42 -6 C-38 -29 -18 -42 7 -41" fill="none" stroke="#2a9d8f" stroke-width="6" stroke-linecap="round"/>
      <polygon points="0,-52 17,-43 -1,-33" fill="#2a9d8f"/>
    </g>

    <text x="1112" y="615" class="cardtitle">Why this SDG fits the project</text>
    <text x="1112" y="645" class="body">The app gives the mess better demand information, helping staff cook closer to actual need and reduce avoidable waste.</text>

    <text x="1112" y="700" class="label">App features connected to this SDG</text>
    <text x="1112" y="728" class="small">- Pre-order data supports smarter quantity planning</text>
    <text x="1112" y="754" class="small">- Demand trends guide purchasing and preparation</text>
    <text x="1112" y="780" class="small">- Lower overproduction means fewer leftovers and losses</text>

    <text x="1112" y="830" class="label">What the chart is showing</text>
    <text x="1112" y="858" class="small">The recycle icon represents efficient food production and use.</text>
    <text x="1112" y="884" class="small">The app connects digital demand tracking with sustainable kitchen operations.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="930" width="1480" height="45" rx="22" fill="#ffffff"/>
    <text x="88" y="958" class="small">Chart definition: this infographic places the app at the center, shows its operating flow, and links the resulting benefits to three SDGs: food access, well-being, and responsible consumption.</text>
  </g>
</svg>
