<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#eef8ef"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3d5e"/>
      <stop offset="100%" stop-color="#1b7f79"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8d25c"/>
      <stop offset="100%" stop-color="#f0a94b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5abf6a"/>
      <stop offset="100%" stop-color="#2f8f46"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6b55b"/>
      <stop offset="100%" stop-color="#cc7f1a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#29434e" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 48px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 22px 'Segoe UI', Arial, sans-serif; fill: #d7edff; }
      .apptitle { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .sdg { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .tag { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .body { font: 18px 'Segoe UI', Arial, sans-serif; fill: #4d657a; }
      .mini { font: 16px 'Segoe UI', Arial, sans-serif; fill: #6b8294; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1350" cy="130" r="190" fill="#d7efe7" opacity="0.7"/>
  <circle cx="210" cy="840" r="220" fill="#d9e9ff" opacity="0.75"/>

  <g filter="url(#shadow)">
    <rect x="70" y="55" width="1460" height="190" rx="36" fill="url(#hero)"/>
    <text x="110" y="120" class="title">College Mess App</text>
    <text x="110" y="165" class="subtitle">SDG Poster</text>
    <text x="110" y="205" class="subtitle">Smart meals. Better health. Less waste.</text>

    <g transform="translate(1160 78)">
      <rect x="0" y="0" width="250" height="145" rx="28" fill="#ffffff" opacity="0.12"/>
      <rect x="96" y="18" width="84" height="118" rx="18" fill="#ffffff"/>
      <rect x="106" y="31" width="64" height="78" rx="12" fill="#dff2ff"/>
      <rect x="116" y="42" width="44" height="12" rx="6" fill="#f8d25c"/>
      <rect x="116" y="61" width="44" height="12" rx="6" fill="#5abf6a"/>
      <rect x="116" y="80" width="44" height="12" rx="6" fill="#f6b55b"/>
      <circle cx="138" cy="121" r="6" fill="#ccd8e2"/>
      <path d="M26 72 h44 a16 16 0 0 1 16 16 v18 h-60 z" fill="#f08c4a"/>
      <path d="M18 106 h74 a16 16 0 0 1 16 16 v14 h-90 z" fill="#f5bf59"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="575" y="305" width="450" height="390" rx="42" fill="#ffffff"/>
    <text x="652" y="360" class="apptitle">App Impact</text>
    <circle cx="800" cy="500" r="114" fill="#eef7ff"/>
    <circle cx="800" cy="500" r="88" fill="#ffffff" stroke="#c6dced" stroke-width="4"/>
    <path d="M748 480 h104 a22 22 0 0 1 22 22 v44 h-148 z" fill="#f5bf59"/>
    <path d="M760 446 h70 a18 18 0 0 1 18 18 v20 h-88 z" fill="#f08c4a"/>
    <circle cx="775" cy="498" r="13" fill="#ffffff"/>
    <circle cx="810" cy="498" r="13" fill="#ffffff"/>
    <path d="M748 557 h104" stroke="#0f3d5e" stroke-width="8" stroke-linecap="round"/>
    <rect x="740" y="598" width="120" height="42" rx="21" fill="#0f3d5e"/>
    <text x="766" y="625" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">SDG LINK</text>
    <text x="690" y="665" class="body">Menu + Booking + Planning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="85" y="330" width="380" height="250" rx="32" fill="#ffffff"/>
    <rect x="85" y="330" width="380" height="78" rx="32" fill="url(#gold)"/>
    <text x="118" y="378" class="sdg">SDG 2</text>
    <text x="230" y="378" class="sdg">Zero Hunger</text>
    <circle cx="276" cy="480" r="56" fill="#fff7df" stroke="#e1b24c" stroke-width="4"/>
    <circle cx="276" cy="480" r="28" fill="none" stroke="#e1b24c" stroke-width="4"/>
    <circle cx="262" cy="468" r="7" fill="#68b86f"/>
    <circle cx="289" cy="490" r="7" fill="#f4978e"/>
    <rect x="271" y="452" width="6" height="33" rx="3" fill="#f08c4a"/>
    <rect x="295" y="452" width="6" height="33" rx="3" fill="#f5bf59"/>
    <text x="123" y="540" class="tag">Meal Access</text>
    <text x="123" y="572" class="body">Students can see and secure food on time.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1115" y="330" width="400" height="250" rx="32" fill="#ffffff"/>
    <rect x="1115" y="330" width="400" height="78" rx="32" fill="url(#green)"/>
    <text x="1148" y="378" class="sdg">SDG 3</text>
    <text x="1260" y="378" class="sdg">Good Health</text>
    <path d="M1365 442 C1353 419 1324 410 1303 433 C1281 410 1252 419 1240 442 C1228 466 1241 493 1303 537 C1364 493 1377 466 1365 442 Z" fill="#ffe1e7" stroke="#4c9f38" stroke-width="4"/>
    <rect x="1288" y="453" width="30" height="10" rx="5" fill="#4c9f38"/>
    <rect x="1298" y="443" width="10" height="30" rx="5" fill="#4c9f38"/>
    <text x="1153" y="540" class="tag">Well-Being</text>
    <text x="1153" y="572" class="body">Faster pickup means less stress and better routine.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="245" y="725" width="1110" height="200" rx="34" fill="#ffffff"/>
    <rect x="245" y="725" width="1110" height="78" rx="34" fill="url(#bronze)"/>
    <text x="280" y="773" class="sdg">SDG 12</text>
    <text x="410" y="773" class="sdg">Responsible Consumption and Production</text>

    <g transform="translate(395 850)">
      <circle cx="0" cy="0" r="54" fill="#fff6e6" stroke="#cf861b" stroke-width="4"/>
      <path d="M-6 -32 C20 -33 38 -16 41 8" fill="none" stroke="#1b7f79" stroke-width="6" stroke-linecap="round"/>
      <polygon points="46,2 45,22 29,10" fill="#1b7f79"/>
      <path d="M26 26 C11 47 -18 54 -40 39" fill="none" stroke="#1b7f79" stroke-width="6" stroke-linecap="round"/>
      <polygon points="-35,51 -50,36 -28,33" fill="#1b7f79"/>
      <path d="M-42 -6 C-38 -30 -18 -42 7 -41" fill="none" stroke="#1b7f79" stroke-width="6" stroke-linecap="round"/>
      <polygon points="0,-52 17,-43 -1,-33" fill="#1b7f79"/>
    </g>

    <text x="500" y="846" class="tag">Waste Reduction</text>
    <text x="500" y="882" class="body">Pre-orders help the mess cook only what is needed.</text>
  </g>

  <g opacity="0.8">
    <path d="M465 456 C515 452 548 452 575 470" stroke="#b4c8d8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="571,459 588,474 566,477" fill="#b4c8d8"/>
    <path d="M1025 470 C1060 452 1090 450 1115 455" stroke="#b4c8d8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="1104,444 1128,457 1105,466" fill="#b4c8d8"/>
    <path d="M800 695 C800 718 800 725 800 725" stroke="#b4c8d8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="790,713 800,731 810,713" fill="#b4c8d8"/>
  </g>

  <text x="535" y="970" class="mini">Minimal poster version linking the College Mess App to SDG 2, SDG 3, and SDG 12.</text>
</svg>
